# Setup your media folder where images and attached documents will be uploaded
media:
  input: public/uploads
  output: /uploads

content:
  # ----------------------------------------------------------------
  # 1. About Me Data (Single File Configuration)
  # ----------------------------------------------------------------
  - name: about_me
    label: About Me Profile
    type: file
    path: src/data/AboutMeData.json # Update this path if your JSON file is located elsewhere
    format: json
    fields:
      # --- Education Array ---
      - name: education
        label: Education History
        type: object
        list: true
        fields:
          - { name: institution, label: Institution, type: string, required: true }
          - { name: years, label: Years/Duration, type: string }
          - { name: gpa, label: GPA, type: string }
          - { name: honors, label: Honors & Distinctions, type: string }
          - { name: degrees, label: Degrees Earned, type: string, list: true }
          - { name: description, label: Description, type: text }

      # --- Skills Map Object ---
      - name: skills
        label: Skills Matrix
        type: object
        fields:
          - name: tabs
            label: Navigation Tabs
            type: object
            list: true
            fields:
              - { name: id, label: Tab ID (e.g., technical), type: string, required: true }
              - { name: label, label: Tab UI Label (e.g., Technical), type: string, required: true }
          - name: categories
            label: Skills Categories
            type: object
            fields:
              - name: professional
                label: Professional Skills
                type: object
                list: true
                fields:
                  - { name: name, label: Skill Name, type: string }
                  - { name: years, label: Years of Experience, type: string }
                  - { name: description, label: Short Description, type: text }
              - name: technical
                label: Technical Skills
                type: object
                list: true
                fields:
                  - { name: name, label: Skill Name, type: string }
                  - { name: years, label: Years of Experience, type: string }
                  - { name: description, label: Short Description, type: text }
              - name: practical
                label: Practical Skills
                type: object
                list: true
                fields:
                  - { name: name, label: Skill Name, type: string }
                  - { name: years, label: Years of Experience, type: string }
                  - { name: description, label: Short Description, type: text }

      # --- Experience Array ---
      - name: experience
        label: Work & Leadership Experience
        type: object
        list: true
        fields:
          - { name: role, label: Role/Position, type: string, required: true }
          - { name: company, label: Organization/Company, type: string, required: true }
          - { name: duration, label: Duration, type: string }
          - { name: description, label: Base Description, type: text }
          - { name: bullets, label: Bullet Points, type: string, list: true }
          - { name: technologies, label: Technologies & Keywords, type: string, list: true }

      # --- Awards Array ---
      - name: awards
        label: Awards & Certifications
        type: object
        list: true
        fields:
          - { name: title, label: Award Title, type: string, required: true }
          - { name: category, label: Issuing Body / Category, type: string }
          - { name: date, label: Date Awarded, type: string }
          - { name: description, label: Description, type: text }
          - { name: link, label: Verification Link (Optional), type: string }

      # --- Logos Array (Optional property handled safely) ---
      - name: logos
        label: Organization Logos
        type: object
        list: true
        fields:
          - { name: name, label: Organization Name, type: string }
          - { name: url, label: Logo Image, type: image }

  # ----------------------------------------------------------------
  # 2. Articles Collection (Folder-based Configuration)
  # ----------------------------------------------------------------
  - name: articles
    label: Portfolio Articles
    type: collection
    path: src/data/articles # Update this folder path to where your individual article JSONs live
    format: json
    filename: "{primary}.json"
    view:
      primary: name
    fields:
      - { name: name, label: Article Title, type: string, required: true }
      - { name: description, label: Summary Description, type: text }
      - { name: tags, label: Tags, type: string, list: true }
      
      # --- Code Repositories ---
      - name: repositories
        label: GitHub Repositories
        type: object
        list: true
        fields:
          - { name: name, label: Repo Identifier (e.g., User/Repo), type: string }
          - { name: url, label: Repo Link, type: string }

      # --- External References ---
      - name: otherLinks
        label: References & Resources
        type: object
        list: true
        fields:
          - { name: name, label: Resource Name, type: string }
          - { name: url, label: Resource URL, type: string }

      - { name: publishDate, label: Date Published, type: date }
      - { name: coverImages, label: Cover Gallery, type: image, list: true }

      # --- Document Attachments ---
      - name: files
        label: Project Files / Attachments
        type: object
        list: true
        fields:
          - { name: name, label: Attachment Label, type: string }
          - { name: url, label: Upload File, type: file }

      - { name: folderName, label: Optional Folder Sub-Path, type: string }