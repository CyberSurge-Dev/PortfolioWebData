# 1. Setup media directories for asset upload targets
media:
  - name: project_images
    label: Project Gallery / Covers
    input: projects/media/images
    output: projects/media/images
  - name: project_files
    label: Project Downloads / Attachments
    input: projects/media/files
    output: projects/media/files

content:
  # ==========================================
  # SECTION 1: ABOUT ME / RESUME JSON 
  # ==========================================
  - name: about_me
    label: Resume / About Me
    type: file
    path: AboutMeData.json
    format: json
    fields:
      - name: education
        label: Education History
        type: object
        list: true
        fields:
          - name: institution
            type: string
          - name: years
            type: string
          - name: gpa
            type: string
          - name: honors
            type: string
          - name: degrees
            type: string
            list: true
          - name: description
            type: text

      - name: skills
        label: Technical Skills
        type: object
        fields:
          - name: tabs
            label: Navigation Tabs Layout
            type: object
            list: true
            fields:
              - name: id
                label: Tab ID Key (e.g., frontend)
                type: string
              - name: label
                label: Tab Display Label (e.g., Frontend Frameworks)
                type: string
          - name: categories
            label: Skills Matrix (JSON Dictionary Map)
            type: code
            options:
              format: json
            description: "Matches your Record type schema. Example: { \"frontend\": [ { \"name\": \"Vue\", \"years\": \"3\", \"description\": \"...\" } ] }"

      - name: experience
        label: Professional Work Experience
        type: object
        list: true
        fields:
          - name: role
            type: string
          - name: company
            type: string
          - name: duration
            type: string
          - name: description
            type: text
          - name: bullets
            type: string
            list: true
          - name: technologies
            type: string
            list: true

      - name: awards
        label: Awards, Honors & Recognitions
        type: object
        list: true
        fields:
          - name: title
            type: string
          - name: category
            type: string
          - name: date
            type: string
          - name: description
            type: text
          - name: link
            type: string

      - name: logos
        label: Associated Company Logos
        type: object
        list: true
        fields:
          - name: name
            type: string
          - name: url
            type: string

  # ==========================================
  # SECTION 2: PORTFOLIO ARTICLES (FRONTMATTER)
  # ==========================================
  - name: projects
    label: Portfolio Projects
    type: collection
    path: projects
    subfolders: true
    format: yaml-frontmatter
    filename: "{name}/article.md"
    fields:
      - name: name
        label: Project / Article Name
        type: string
        required: true
      - name: description
        label: Short Summary Description
        type: text
      - name: publishDate
        label: Publication Date
        type: date
        required: true
      - name: tags
        label: Article Tags
        type: string
        list: true

      - name: repositories
        label: Code Repositories
        type: object
        list: true
        fields:
          - name: name
            label: Label (e.g., GitHub Backend)
            type: string
          - name: url
            label: Repository URL
            type: string

      - name: otherLinks
        label: External Project Links
        type: object
        list: true
        fields:
          - name: name
            label: Label (e.g., Live Demo App)
            type: string
          - name: url
            label: URL Location
            type: string

      # Media upload fields mapping directly to your ArticleMeta types
      - name: coverImages
        label: Cover Gallery / Images
        type: image
        options:
          media: project_images
          multiple: true

      - name: files
        label: Downloadable Files & Documents
        type: object
        list: true
        fields:
          - name: name
            label: Document Display Name (e.g., Project Blueprint PDF)
            type: string
          - name: url
            label: Upload Document Attachment
            type: file
            options:
              media: project_files

      - name: body
        label: Markdown Article Content Body
        type: rich-text