# PagesCMS will upload all images/files into an 'assets' folder at the root of your repo
media:
  input: assets
  output: assets

content:
  # ----------------------------------------------------------------
  # 1. About Me Data
  # ----------------------------------------------------------------
  - name: about_me
    label: About Me Profile
    type: file
    path: AboutMeData.json
    format: json
    fields:
      - name: education
        label: Education History
        type: object
        list: true
        fields:
          - { name: institution, label: Institution, type: string, required: true }
          - { name: years, label: Years/Duration, type: string }
          - { name: gpa, label: GPA, type: string }
          - { name: honors, label: Honors & Distinctions, type: string }
          - { name: degrees, label: Degrees Earned, type: string, list: true }
          - { name: description, label: Description, type: text }

      - name: skills
        label: Skills Matrix
        type: object
        fields:
          - name: tabs
            label: Navigation Tabs
            type: object
            list: true
            fields:
              - { name: id, label: Tab ID, type: string, required: true }
              - { name: label, label: Tab UI Label, type: string, required: true }
          - name: categories
            label: Skills Categories
            type: object
            fields:
              - name: professional
                label: Professional Skills
                type: object
                list: true
                fields:
                  - { name: name, label: Skill Name, type: string }
                  - { name: years, label: Years of Experience, type: string }
                  - { name: description, label: Short Description, type: text }
              - name: technical
                label: Technical Skills
                type: object
                list: true
                fields:
                  - { name: name, label: Skill Name, type: string }
                  - { name: years, label: Years of Experience, type: string }
                  - { name: description, label: Short Description, type: text }
              - name: practical
                label: Practical Skills
                type: object
                list: true
                fields:
                  - { name: name, label: Skill Name, type: string }
                  - { name: years, label: Years of Experience, type: string }
                  - { name: description, label: Short Description, type: text }

      - name: experience
        label: Work & Leadership Experience
        type: object
        list: true
        fields:
          - { name: role, label: Role/Position, type: string, required: true }
          - { name: company, label: Organization/Company, type: string, required: true }
          - { name: duration, label: Duration, type: string }
          - { name: description, label: Base Description, type: text }
          - { name: bullets, label: Bullet Points, type: string, list: true }
          - { name: technologies, label: Technologies & Keywords, type: string, list: true }

      - name: awards
        label: Awards & Certifications
        type: object
        list: true
        fields:
          - { name: title, label: Award Title, type: string, required: true }
          - { name: category, label: Issuing Body / Category, type: string }
          - { name: date, label: Date Awarded, type: string }
          - { name: description, label: Description, type: text }
          - { name: link, label: Verification Link (Optional), type: string }

      - name: logos
        label: Organization Logos
        type: object
        list: true
        fields:
          - { name: name, label: Organization Name, type: string }
          - { name: url, label: Logo Image, type: image }

  # ----------------------------------------------------------------
  # 2. Meta Articles (Global Tags Settings)
  # ----------------------------------------------------------------
  - name: meta_articles
    label: Global Article Settings
    type: file
    path: MetaArticles.json
    format: json
    fields:
      - name: tags
        label: Available Global Tags
        type: object
        list: true
        fields:
          - { name: name, label: Tag Name, type: string, required: true }
          - { name: color, label: Hex Color Code, type: string }

  # ----------------------------------------------------------------
  # 3. Articles Collection (Folder-per-article structure at root)
  # ----------------------------------------------------------------
  - name: articles
    label: Portfolio Articles
    type: collection
    path: .
    filename: "{slug}/article.md"
    format: md
    view:
      primary: name
    fields:
      - { name: name, label: Article Title, type: string, required: true }
      - { name: description, label: Summary Description, type: text }
      - { name: tags, label: Tags assigned, type: string, list: true }
      
      - name: repositories
        label: GitHub Repositories
        type: object
        list: true
        fields:
          - { name: name, label: Repo Identifier (User/Repo), type: string }
          - { name: url, label: Repo Link, type: string }

      - name: otherLinks
        label: References & Resources
        type: object
        list: true
        fields:
          - { name: name, label: Resource Name, type: string }
          - { name: url, label: Resource URL, type: string }

      - { name: publishDate, label: Date Published, type: date }

      # --- CMS MANAGED UPLOADS ---
      
      # 1. Maps directly to: coverImages: string[]
      - name: coverImages
        label: Cover Image Gallery
        type: image
        list: true

      # 2. Maps directly to: files: LinkItem[]
      - name: files
        label: Project Files & Downloads
        type: object
        list: true
        fields:
          - { name: name, label: File Display Name (e.g., Robot CAD Schematic), type: string, required: true }
          - { name: url, label: Upload File Asset, type: file, required: true }