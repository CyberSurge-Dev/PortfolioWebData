media:
  input: projects
  output: projects

content:
  # 1. Accommodates your exact complex AboutMeData.json structure
  - name: about_me
    label: Resume / About Me
    type: file
    path: AboutMeData.json
    format: json
    fields:
      - name: education
        label: Education History
        type: object
        list: true
        fields:
          - name: institution
            type: string
          - name: years
            type: string
          - name: gpa
            type: string
          - name: honors
            type: string
          - name: degrees
            type: string
            list: true
          - name: description
            type: text

      - name: experience
        label: Work Experience
        type: object
        list: true
        fields:
          - name: role
            type: string
          - name: company
            type: string
          - name: duration
            type: string
          - name: description
            type: text
          - name: bullets
            type: string
            list: true
          - name: technologies
            type: string
            list: true

  # 2. Accommodates your exact ArticleMeta structure using Frontmatter
  - name: projects
    label: Portfolio Projects
    type: collection
    path: projects
    subfolders: true
    format: yaml-frontmatter
    filename: "{name}/article.md" # Generates the folder name dynamically from your "name" field
    fields:
      - name: name
        label: Project / Article Name
        type: string
        required: true
      - name: description
        label: Description Summary
        type: text
      - name: publishDate
        label: Publish Date
        type: date
        required: true
      - name: tags
        label: Tags
        type: string
        list: true

      # Maps directly to your LinkItem[] array type
      - name: repositories
        label: Repository Links
        type: object
        list: true
        fields:
          - name: name
            label: Link Label (e.g., GitHub Frontend)
            type: string
          - name: url
            label: URL
            type: string

      # Maps directly to your LinkItem[] array type
      - name: otherLinks
        label: Other External Links
        type: object
        list: true
        fields:
          - name: name
            label: Link Label (e.g., Live Demo)
            type: string
          - name: url
            label: URL
            type: string

      - name: body
        label: Markdown Write-up Body
        type: rich-text